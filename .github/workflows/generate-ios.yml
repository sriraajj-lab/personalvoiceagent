name: Generate iOS Native Directory

on:
  workflow_dispatch:

jobs:
  generate-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Expo prebuild (generate iOS directory)
        run: npx expo prebuild --platform ios
      
      - name: Commit and push generated iOS directory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ios/ package-lock.json
          git commit -m "ci: generate ios native project directory via expo prebuild" || echo "No changes to commit"
          git fetch origin main
          git rebase origin/main || true
          git push origin HEAD:main --force-with-lease
